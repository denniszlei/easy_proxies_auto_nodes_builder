name: Build node list

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build node artifact
        run: python scripts/build_nodes.py

      - name: Commit updated artifacts
        run: |
          if git diff --quiet -- dist/node.txt dist/metadata.json; then
            echo "No artifact changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/node.txt dist/metadata.json
          git commit -m "chore: refresh node list"
          git push
